<mat-tab-group
  class="sidebar-tabs"
  [selectedIndex]="selectedTabIndex()"
  (selectedIndexChange)="tabChange.emit($event)"
  animationDuration="200ms">

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">search</mat-icon>
      <span class="tab-label">Buscar</span>
    </ng-template>
    <app-search-tab />
  </mat-tab>

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">layers</mat-icon>
      <span class="tab-label">Capas</span>
    </ng-template>
    <app-layers-tab />
  </mat-tab>

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">edit</mat-icon>
      <span class="tab-label">Dibujar</span>
    </ng-template>
    <app-draw-tab />
  </mat-tab>

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">construction</mat-icon>
      <span class="tab-label">Análisis</span>
    </ng-template>
    <app-tools-tab />
  </mat-tab>

  <!-- NEW: Routing -->
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">route</mat-icon>
      <span class="tab-label">Ruta</span>
    </ng-template>
    <app-routing-tab />
  </mat-tab>

  <!-- NEW: Topology -->
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">join_inner</mat-icon>
      <span class="tab-label">Topología</span>
    </ng-template>
    <app-topology-tab />
  </mat-tab>

  <!-- NEW: Import -->
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon class="tab-icon">upload_file</mat-icon>
      <span class="tab-label">Importar</span>
    </ng-template>
    <app-import-tab />
  </mat-tab>

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon
        class="tab-icon"
        [matBadge]="featureCount() > 0 ? featureCount() : null"
        matBadgeColor="accent"
        matBadgeSize="small">
        dataset
      </mat-icon>
      <span class="tab-label">Datos</span>
    </ng-template>
    <app-data-tab />
  </mat-tab>

</mat-tab-group>
